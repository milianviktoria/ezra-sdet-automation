name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'

# Tests target Ezra's staging environment and require credentials that are not
# publicly accessible from GitHub Actions runners.
# Trigger manually via Actions → Run workflow, or configure self-hosted runners
# with network access to staging.

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm test
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          API_BASE:       ${{ secrets.API_BASE }}
          EZRA_EMAIL:     ${{ secrets.EZRA_EMAIL }}
          EZRA_PASSWORD:  ${{ secrets.EZRA_PASSWORD }}
          MEMBER_A_GUID:  ${{ secrets.MEMBER_A_GUID }}
          MEMBER_B_GUID:  ${{ secrets.MEMBER_B_GUID }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
